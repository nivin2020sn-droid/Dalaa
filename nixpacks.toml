[phases.setup]
nixPkgs = ["python311", "nodejs_20", "yarn"]

[phases.install]
cmds = [
  "cd frontend && yarn install --frozen-lockfile --network-timeout 600000",
  "cd backend && pip install -r requirements.txt"
]

[phases.build]
cmds = [
  "cd frontend && REACT_APP_BACKEND_URL='' CI=false yarn build"
]

[start]
cmd = "cd backend && STATIC_DIR=\"$(pwd)/../frontend/build\" uvicorn server:app --host 0.0.0.0 --port $PORT"
