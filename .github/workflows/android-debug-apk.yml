name: Build Android Debug APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # يسمح بتشغيل البناء يدوياً من تبويب Actions

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Setup Java 21 (required by Capacitor 7)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'

      - name: Install frontend dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build React app
        working-directory: frontend
        run: yarn build

      - name: Add Android platform (if missing)
        working-directory: frontend
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor with Android
        working-directory: frontend
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: frontend/android
        run: chmod +x ./gradlew

      - name: Build Debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp frontend/android/app/build/outputs/apk/debug/app-debug.apk artifacts/dalaa-beauty-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dalaa-beauty-debug-apk
          path: artifacts/dalaa-beauty-debug.apk
          retention-days: 30
