name: Build Android Debug APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # يسمح بتشغيل البناء يدوياً من تبويب Actions

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # لا نستخدم cache لتجنّب فشل البناء إذا لم يكن هناك yarn.lock

      - name: Enable Corepack (Yarn)
        run: corepack enable

      - name: Setup Java 21 (required by Capacitor 7)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          if [ -f yarn.lock ]; then
            yarn install --frozen-lockfile
          else
            yarn install
          fi

      - name: Build React app
        working-directory: frontend
        run: yarn build

      - name: Add Android platform (if missing)
        working-directory: frontend
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Declare storage permissions in AndroidManifest.xml
        working-directory: frontend
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "android.permission.WRITE_EXTERNAL_STORAGE" "$MANIFEST"; then
            python3 -c "
          import pathlib, re
          p = pathlib.Path('android/app/src/main/AndroidManifest.xml')
          t = p.read_text()
          perms = '    <uses-permission android:name=\"android.permission.READ_EXTERNAL_STORAGE\" android:maxSdkVersion=\"32\"/>\n    <uses-permission android:name=\"android.permission.WRITE_EXTERNAL_STORAGE\" android:maxSdkVersion=\"28\"/>\n'
          t = re.sub(r'</manifest>\s*$', perms + '</manifest>\n', t)
          p.write_text(t)
          print('Patched AndroidManifest.xml with storage permissions')
          "
          fi
          grep -n "uses-permission" android/app/src/main/AndroidManifest.xml || true

      - name: Generate Android icons & splash
        working-directory: frontend
        run: npx capacitor-assets generate --android --iconBackgroundColor '#ffffff' --splashBackgroundColor '#ffffff' || echo "assets generation failed — continuing with default icons"

      - name: Sync Capacitor with Android
        working-directory: frontend
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: frontend/android
        run: chmod +x ./gradlew

      - name: Build Debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp frontend/android/app/build/outputs/apk/debug/app-debug.apk artifacts/dalaa-beauty-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dalaa-beauty-debug-apk
          path: artifacts/dalaa-beauty-debug.apk
          retention-days: 30
